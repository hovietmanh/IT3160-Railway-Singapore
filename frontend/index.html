<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Downtown Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <div id="sidebar">
        <h1>Downtown Navigator</h1>
        <div class="section">
            <label>Điểm bắt đầu</label>
            <div class="coord-display" id="start-display">Chưa chọn</div>
            <button class="btn success" id="btn-select-start">Click chọn START</button>
        </div>
        <div class="section">
            <label>Điểm kết thúc</label>
            <div class="coord-display" id="end-display">Chưa chọn</div>
            <button class="btn danger" id="btn-select-end">Click chọn END</button>
        </div>
        <div class="section">
            <label>Phương tiện</label>
            <div class="btn-row">
                <button class="btn secondary" id="btn-car">Ô tô</button>
                <button class="btn secondary active" id="btn-foot">Đi bộ</button>
            </div>
        </div>
        <div class="section">
            <label>Tốc độ (km/h)</label>
            <input type="number" id="speed" value="5" min="1" max="120"
                style="padding:6px;border-radius:6px;border:1px solid #334155;
                background:#0f172a;color:#f1f5f9;font-size:13px;width:100%"/>
        </div>
        <div class="btn-row">
            <button class="btn primary" id="btn-find">Tìm đường tối ưu</button>
            <button class="btn secondary" id="btn-clear">Xóa</button>
        </div>
        <div class="section">
            <label>Thông tin đường đi</label>
            <table class="result-table">
                <tr><td>Khoảng cách</td><td id="result-distance">-</td></tr>
                <tr><td>Số điểm</td><td id="result-nodes">-</td></tr>
                <tr><td>Thời gian</td><td id="result-time">-</td></tr>
            </table>
        </div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js?v=4"></script>
    <script src="js/map.js?v=4"></script>
    <script src="js/pathfinding.js?v=4"></script>
</body>
</html>
