<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Singapore MRT Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <div id="sidebar">
        <h1>Singapore MRT Navigator</h1>

        <!-- Hướng dẫn chọn điểm -->
        <div id="instruction-box">
            <div id="instruction-text" class="instruction active">
                Click lên bản đồ để chọn <strong>điểm xuất phát</strong>
            </div>
        </div>

        <!-- Thông tin điểm đầu -->
        <div class="point-card" id="start-card">
            <div class="point-header">
                <span class="point-dot start-dot"></span>
                <span class="point-label">Điểm xuất phát</span>
                <button class="btn-clear-point" id="btn-clear-start" title="Xóa">✕</button>
            </div>
            <div class="point-station" id="start-station-name">Chưa chọn</div>
            <div class="point-lines" id="start-station-lines"></div>
        </div>

        <!-- Thông tin điểm đến -->
        <div class="point-card" id="end-card">
            <div class="point-header">
                <span class="point-dot end-dot"></span>
                <span class="point-label">Điểm đến</span>
                <button class="btn-clear-point" id="btn-clear-end" title="Xóa">✕</button>
            </div>
            <div class="point-station" id="end-station-name">Chưa chọn</div>
            <div class="point-lines" id="end-station-lines"></div>
        </div>

        <!-- Nút tìm đường -->
        <div class="btn-row">
            <button class="btn primary" id="btn-find" disabled>Tìm đường</button>
            <button class="btn secondary" id="btn-clear">Xóa tất cả</button>
        </div>

        <!-- Thông báo tuyến/ga bị đóng chặn đường -->
        <div id="blocked-box"></div>

        <!-- Kết quả -->
        <div id="result-box">
            <h3>Kết quả</h3>
            <div class="result-row">
                <span>Số ga</span>
                <span id="result-stops">-</span>
            </div>
            <div class="result-row">
                <span>Khoảng cách</span>
                <span id="result-dist">-</span>
            </div>
            <!-- Danh sách tuyến sử dụng -->
            <div id="result-lines"></div>
            <!-- Chuỗi ga -->
            <div id="result-path"></div>
            <!-- Thông báo ga thay thế -->
            <div id="result-alt"></div>
        </div>

        <!-- Chú thích tuyến -->
        <div id="legend-box">
            <div class="legend-title">Các tuyến MRT</div>
            <div id="legend-list"></div>
        </div>
    </div>

    <!-- Modal thông báo -->
    <div id="mrt-modal-overlay" style="display:none">
        <div id="mrt-modal">
            <div id="mrt-modal-title"></div>
            <div id="mrt-modal-body"></div>
            <div id="mrt-modal-actions"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/map.js"></script>
    <script src="js/pathfinding.js"></script>
</body>
</html>
