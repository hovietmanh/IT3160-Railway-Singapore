<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Singapore MRT Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
    <div id="sidebar">
        <h1>Singapore MRT Navigator</h1>

        <div class="search-box" id="start-box">
            <label>Điểm xuất phát</label>
            <input type="text" id="start-input" placeholder="Nhập tên ga..."/>
            <ul class="suggest-list" id="start-list"></ul>
        </div>

        <div class="search-box" id="end-box">
            <label>Điểm đến</label>
            <input type="text" id="end-input" placeholder="Nhập tên ga..."/>
            <ul class="suggest-list" id="end-list"></ul>
        </div>

        <div class="btn-row">
            <button class="btn primary"   id="btn-find">Tìm đường</button>
            <button class="btn secondary" id="btn-clear">Xóa</button>
        </div>

        <div id="result-box">
            <h3>Kết quả</h3>
            <div class="result-row">
                <span>Số ga</span>
                <span id="result-stops">-</span>
            </div>
            <div class="result-row">
                <span>Khoảng cách</span>
                <span id="result-dist">-</span>
            </div>
            <div id="result-path"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/map.js"></script>
    <script src="js/pathfinding.js"></script>
</body>
</html>
