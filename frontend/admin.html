<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MRT Admin Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>

    <!-- Trang đăng nhập -->
    <div id="login-page">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="text"     id="username" placeholder="Username"/>
            <input type="password" id="password" placeholder="Password"/>
            <button id="btn-login">Đăng nhập</button>
            <p id="login-error"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none">
        <div id="admin-sidebar">
            <div class="admin-header">
                <h1>MRT Admin</h1>
                <button id="btn-logout" class="btn-sm danger">Logout</button>
            </div>

            <!-- Quản lý tuyến -->
            <div class="section">
                <div class="section-title">Đóng / Mở tuyến tàu</div>
                <p class="hint">Khi đóng tuyến, toàn bộ đoạn ray trên tuyến đó sẽ không được sử dụng. Các ga vẫn hoạt động với tuyến khác.</p>
                <div id="lines-list"></div>
            </div>

            <!-- Kịch bản đang hoạt động -->
            <div class="section">
                <div class="section-title">Tuyến đang bị đóng</div>
                <ul id="scenario-list"></ul>
                <button class="btn danger" id="btn-clear-all">Mở lại tất cả</button>
            </div>
        </div>

        <div id="admin-map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
