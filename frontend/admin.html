<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MRT Admin Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
    <!-- Login Page -->
    <div id="login-page">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="text"     id="username" placeholder="Username"/>
            <input type="password" id="password" placeholder="Password"/>
            <button id="btn-login">Đăng nhập</button>
            <p id="login-error"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display:none">
        <div id="admin-sidebar">
            <div class="admin-header">
                <h1>MRT Admin</h1>
                <button id="btn-logout" class="btn-sm danger">Logout</button>
            </div>

            <div class="section">
                <div class="section-title">Loại kịch bản</div>
                <div class="mode-btns">
                    <button class="mode-btn active" data-mode="block">Đóng ga</button>
                    <button class="mode-btn" data-mode="maintenance">Bảo trì ray</button>
                    <button class="mode-btn" data-mode="penalty">Tắc nghẽn</button>
                </div>
            </div>

            <div class="section" id="block-panel">
                <div class="section-title">Đóng ga</div>
                <p class="hint">Click vào ga trên bản đồ để đóng</p>
            </div>

            <div class="section" id="maintenance-panel" style="display:none">
                <div class="section-title">Bảo trì đường ray</div>
                <p class="hint">Click 2 ga liền kề để chặn đoạn ray</p>
                <div class="field">
                    <label>Ga 1</label>
                    <div class="val" id="maint-from">Chưa chọn</div>
                </div>
                <div class="field">
                    <label>Ga 2</label>
                    <div class="val" id="maint-to">Chưa chọn</div>
                </div>
                <button class="btn primary" id="btn-maint-apply">Áp dụng</button>
            </div>

            <div class="section" id="penalty-panel" style="display:none">
                <div class="section-title">Tắc nghẽn</div>
                <p class="hint">Click ga bị tắc nghẽn</p>
                <div class="field">
                    <label>Ga bị ảnh hưởng</label>
                    <div class="val" id="penalty-station">Chưa chọn</div>
                </div>
                <div class="field">
                    <label>Hệ số penalty</label>
                    <input type="number" id="penalty-value" value="2" min="1.1" max="10" step="0.1"/>
                </div>
                <button class="btn primary" id="btn-penalty-apply">Áp dụng</button>
            </div>

            <div class="section">
                <div class="section-title">Kịch bản đang hoạt động</div>
                <ul id="scenario-list"></ul>
                <button class="btn danger" id="btn-clear-all">Xóa tất cả</button>
            </div>
        </div>

        <div id="admin-map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
